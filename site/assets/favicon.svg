<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <!-- Open Edge — "The Open Meter": gauge arc open at the bottom, accent needle.
       Colors adapt to the browser/tab theme via prefers-color-scheme. -->
  <style>
    .fg { stroke: #16130f; }
    .ac { stroke: #0b6b43; fill: #0b6b43; }
    @media (prefers-color-scheme: dark) {
      .fg { stroke: #ece9e3; }
      .ac { stroke: #5fd39a; fill: #5fd39a; }
    }
  </style>
  <path class="fg" d="M11.27 36.73 A18 18 0 1 1 36.73 36.73" fill="none" stroke-width="4.2" stroke-linecap="round"/>
  <line class="ac" x1="24" y1="24" x2="33.2" y2="14.8" stroke-width="4.2" stroke-linecap="round"/>
  <circle class="ac" cx="24" cy="24" r="3.8" stroke="none"/>
</svg>
